name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm

            - run: pnpm install

            - name: Typecheck
              run: pnpm run tsc

            - name: Lint
              run: pnpm run lint

            - name: Test
              run: pnpm run test

    benchmark:
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch'
        needs: ci
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm

            - run: pnpm install
            - run: npx playwright install chromium

            - name: Build
              run: pnpm run build

            - name: Run Benchmark
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: pnpm run benchmark

            - uses: actions/upload-artifact@v4
              with:
                  name: benchmark-results
                  path: |
                      benchmark-results/*
                      trajectories/*
